# GitHub Action for deploying the Azure Resume to Azure Static Web Apps

name: Deploy Azure Resume

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering

jobs:
  build_and_deploy_job:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !contains(github.event.head_commit.message, 'skip ci'))
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep Infrastructure
        id: deploy-infra
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: ./infra/main.bicep
          parameters: 'name=${{ secrets.AZURE_STATIC_WEB_APP_NAME }}'

      - name: Build and Deploy Static Web App
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for GitHub integrations
          action: "upload"
          app_location: "frontend" # App source code path
          api_location: "api" # Api source code path
          output_location: "" # Angular build output is automatically detected
          skip_app_build: false # We want the action to build our app
          skip_api_build: false # We want the action to build our api
